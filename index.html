const ACTIVITY=[
  {label:"Sedentario (sin ejercicio)",factor:1.2},
  {label:"Ligero (1-3 días/sem)",factor:1.375},
  {label:"Moderado (3-5 días/sem)",factor:1.55},
  {label:"Activo (6-7 días/sem)",factor:1.725},
  {label:"Muy activo (2x por día)",factor:1.9},
];
const GOALS=[
  {key:"cut",label:"Perder grasa",delta:-400,emoji:"📉"},
  {key:"maintain",label:"Mantener peso",delta:0,emoji:"⚖️"},
  {key:"bulk",label:"Ganar masa",delta:+400,emoji:"📈"},
];

function calcTDEE(p){
  if(!p.weight||!p.height||!p.age)return null;
  const bmr=p.sex==="M"?88.36+13.4*p.weight+4.8*p.height-5.7*p.age:447.6+9.2*p.weight+3.1*p.height-4.3*p.age;
  return Math.round(bmr*(ACTIVITY[p.activity]?.factor||1.55));
}
function calcTargets(p,goal){
  const tdee=calcTDEE(p);if(!tdee)return null;
  const g=GOALS.find(x=>x.key===goal)||GOALS[1];
  const kcal=tdee+g.delta;
  const protein=Math.round(p.weight*2.2);
  const fat=Math.round((kcal*0.28)/9);
  const carbs=Math.round((kcal-protein*4-fat*9)/4);
  return{kcal,protein,carbs,fat};
}
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const todayKey=()=>new Date().toISOString().slice(0,10);

function dateKey(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10);}
function formatFecha(key){
  const[y,m,d]=key.split("-").map(Number);
  const date=new Date(y,m-1,d);
  if(key===todayKey())return"Hoy";
  if(key===dateKey(-1))return"Ayer";
  return date.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
}
function getFrecuentes(){
  const freq=load("macro_frecuentes",{});
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n])=>DB.find(f=>f.nombre===n)).filter(Boolean);
}
function registrarUso(nombre){const freq=load("macro_frecuentes",{});freq[nombre]=(freq[nombre]||0)+1;save("macro_frecuentes",freq);}

function calcPreview(selected,cantidad){
  if(!selected)return null;
  const cant=parseFloat(cantidad)||0;
  let gramos,porcionLabel;
  if(selected.medida==="unidad"){gramos=cant*selected.gramsPorUnidad;porcionLabel=`${cant} ${cant===1?selected.unidadLabel:selected.unidadLabel+"s"} (≈${Math.round(gramos)}g)`;}
  else{gramos=cant;porcionLabel=`${cant}g`;}
  const f=gramos/100;
  return{nombre:selected.nombre,porcion:porcionLabel,kcal:Math.round(selected.kcal*f),proteinas:Math.round(selected.proteinas*f),carbohidratos:Math.round(selected.carbohidratos*f),grasas:Math.round(selected.grasas*f)};
}

function Ring({value,max,color,size=130}){
  const pct=Math.min(value/(max||1),1);const r=(size-14)/2;const circ=2*Math.PI*r;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.border} strokeWidth={10}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10}
            strokeDasharray={`${circ*pct} ${circ}`} strokeLinecap="round"
            style={{transition:"stroke-dasharray 0.4s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontSize:size*0.2,fontWeight:800,color:C.text,lineHeight:1}}>{Math.round(value)}</div>
          <div style={{fontSize:size*0.12,color:C.textDim}}>/ {max}</div>
        </div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:12,fontWeight:600,color}}>kcal</div>
        <div style={{fontSize:11,color:C.textMuted}}>{Math.max(0,max-Math.round(value))} restantes</div>
      </div>
    </div>
  );
}

function MacroBar({label,value,max,color}){
  const pct=Math.min(value/(max||1),1)*100;const over=value>max;
  return(
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <span style={{fontSize:13,fontWeight:600,color}}>{label}</span>
        <span style={{fontSize:13,color:over?C.danger:C.textDim}}>{Math.round(value)}g <span style={{color:C.textMuted}}>/ {max}g</span></span>
      </div>
      <div style={{height:8,background:C.border,borderRadius:99,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:over?C.danger:color,borderRadius:99,transition:"width 0.4s ease"}}/>
      </div>
    </div>
  );
}

  const[results,setResults]=useState([]);
  const[selected,setSelected]=useState(null);
  const frecuentes=getFrecuentes();
  const preview=useMemo(()=>calcPreview(selected,cantidad),[selected,cantidad]);

  const buscar=q=>{setQuery(q);setSelected(null);if(!q.trim()){setResults([]);return;}setResults(DB.filter(f=>f.nombre.toLowerCase().includes(q.toLowerCase())).slice(0,7));};
  const seleccionar=item=>{setSelected(item);setResults([]);setCantidad(item.medida==="unidad"?"1":"100");};
  const confirmar=()=>{if(!preview)return;registrarUso(selected.nombre);onAgregar(preview);setQuery("");setResults([]);setSelected(null);setCantidad("100");};

  return(
    <>
      {frecuentes.length>0&&!query&&!selected&&(
        <div style={{marginBottom:10}}>

            ))}
          </div>
        </div>

      {results.length>0&&!selected&&(
        <div style={{background:C.surface,borderRadius:10,overflow:"hidden",marginBottom:10}}>
          {results.map((r,i)=>(
            <button key={i} onClick={()=>seleccionar(r)} style={{width:"100%",border:"none",borderBottom:i<results.length-1?`1px solid ${C.border}`:"none",background:"transparent",color:C.text,padding:"11px 14px",textAlign:"left",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14}}>{r.nombre}</span>
              <span style={{fontSize:12,color:C.textMuted}}>{r.medida==="unidad"?`por ${r.unidadLabel}`:"por 100g"}</span>
            </button>

        </div>
      )}
      {selected&&(
        <>
          <div style={{background:C.surface,borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:14,fontWeight:600}}>{selected.nombre}</span>

            <input style={S.input} type="number" value={cantidad} step={selected.medida==="unidad"?"1":"10"} onChange={e=>setCantidad(e.target.value)}/>

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={S.card}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>Mi perfil</div>
        <div style={{marginBottom:10}}>
          <div style={S.label}>Nombre</div>
          <input style={S.input} type="text" value={form.name||""} placeholder="Tu nombre" onChange={e=>set("name",e.target.value)}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          {[{k:"weight",label:"Peso (kg)",ph:"75"},{k:"height",label:"Altura (cm)",ph:"175"},{k:"age",label:"Edad",ph:"28"}].map(f=>(
            <div key={f.k}>
              <div style={S.label}>{f.label}</div>
              <input style={S.input} type="number" value={form[f.k]||""} placeholder={f.ph} onChange={e=>set(f.k,parseFloat(e.target.value)||"")}/>
            </div>
          ))}
          <div>
            <div style={S.label}>Sexo</div>
            <select style={S.select} value={form.sex} onChange={e=>set("sex",e.target.value)}>
              <option value="M">Masculino</option><option value="F">Femenino</option>
            </select>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={S.label}>Nivel de actividad</div>
          <select style={S.select} value={form.activity} onChange={e=>set("activity",parseInt(e.target.value))}>
            {ACTIVITY.map((a,i)=><option key={i} value={i}>{a.label}</option>)}
          </select>
        </div>
        {tdee&&(
          <div style={{background:C.surface,borderRadius:10,padding:"12px 14px",marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:11,color:C.textDim,marginBottom:4}}>GASTO CALÓRICO DIARIO</div>
            <div style={{fontSize:28,fontWeight:800,color:C.accent}}>{tdee} <span style={{fontSize:14,fontWeight:400}}>kcal</span></div>
          </div>
        )}
        <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>{save("macro_profile",form);onSave(form);}}>Guardar perfil</button>
      </div>
    </div>
  );
}

function PantallaObjetivo({profile,goal,onSave}){
  const[sel,setSel]=useState(goal);
  const targets=calcTargets(profile,sel);
  return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={S.card}>
        <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>Mi objetivo</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {GOALS.map(g=>(
            <button key={g.key} onClick={()=>setSel(g.key)} style={{border:`2px solid ${sel===g.key?C.accent:C.border}`,borderRadius:12,padding:"14px 16px",background:sel===g.key?C.accentDim:C.surface,color:C.text,textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:22}}>{g.emoji}</span>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{g.label}</div>
                <div style={{fontSize:12,color:C.textDim,marginTop:2}}>{g.delta>0?`+${g.delta}`:g.delta===0?"±0":g.delta} kcal vs TDEE</div>
              </div>
            </button>
          ))}
        </div>
        {targets&&(
          <div style={{background:C.surface,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:12,color:C.textDim,marginBottom:10,fontWeight:600}}>TUS METAS DIARIAS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{label:"Calorías",val:targets.kcal,unit:"kcal",color:C.accent},{label:"Proteínas",val:targets.protein,unit:"g",color:C.protein},{label:"Carbohidratos",val:targets.carbs,unit:"g",color:C.carbs},{label:"Grasas",val:targets.fat,unit:"g",color:C.fat}].map(m=>(
                <div key={m.label} style={{textAlign:"center",padding:"10px 0"}}>
                  <div style={{fontSize:22,fontWeight:800,color:m.color}}>{m.val}</div>
                  <div style={{fontSize:11,color:C.textDim}}>{m.unit}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{m.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        <button style={{...S.btn("primary"),width:"100%"}} onClick={()=>{save("macro_goal",sel);onSave(sel);}}>Confirmar objetivo</button>
      </div>
    </div>
  );
}

function PantallaHoy({profile,goal,combinadas}){
  const targets=calcTargets(profile,goal);
  const[offset,setOffset]=useState(0);
  const currentKey=dateKey(offset);
  const esHoy=offset===0;
  const[entries,setEntries]=useState(()=>load(`macro_day_${currentKey}`,[]) );
  const[showAdd,setShowAdd]=useState(false);

  const changeDay=delta=>{
    const no=offset+delta;setOffset(no);
    setEntries(load(`macro_day_${dateKey(no)}`,[]) );setShowAdd(false);
  };
  const saveEntries=list=>{setEntries(list);save(`macro_day_${currentKey}`,list);};
  const totals=entries.reduce((acc,e)=>({kcal:acc.kcal+e.kcal,protein:acc.protein+e.proteinas,carbs:acc.carbs+e.carbohidratos,fat:acc.fat+e.grasas}),{kcal:0,protein:0,carbs:0,fat:0});

  const profileOk=profile.weight&&profile.height&&profile.age;
  if(!profileOk)return(<div style={{padding:24,textAlign:"center",color:C.textDim,marginTop:40}}><div style={{fontSize:32,marginBottom:12}}>👤</div><div style={{fontSize:15}}>Completá tu perfil primero.</div></div>);

  return(
    <div style={{padding:"16px 16px 0"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={()=>changeDay(-1)} style={{border:"none",background:C.card,color:C.text,borderRadius:8,padding:"6px 14px",fontSize:18,cursor:"pointer"}}>◀</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text}}>{formatFecha(currentKey)}</div>
          {!esHoy&&<div style={{fontSize:11,color:C.textMuted}}>{currentKey}</div>}
        </div>
        <button onClick={()=>changeDay(1)} disabled={esHoy} style={{border:"none",background:esHoy?C.surface:C.card,color:esHoy?C.textMuted:C.text,borderRadius:8,padding:"6px 14px",fontSize:18,cursor:esHoy?"default":"pointer"}}>▶</button>
      </div>
      <div style={{...S.card,display:"flex",justifyContent:"center",padding:"20px 18px"}}>
        <Ring value={totals.kcal} max={targets?.kcal||2000} color={C.accent}/>
      </div>
      <div style={S.card}>
        <MacroBar label="Proteínas" value={totals.protein} max={targets?.protein||150} color={C.protein}/>
        <MacroBar label="Carbohidratos" value={totals.carbs} max={targets?.carbs||250} color={C.carbs}/>
        <MacroBar label="Grasas" value={totals.fat} max={targets?.fat||70} color={C.fat}/>
      </div>
      {!showAdd&&(
        <button style={{...S.btn("primary"),width:"100%",marginBottom:12,fontSize:15,padding:14}} onClick={()=>setShowAdd(true)}>+ Agregar alimento</button>
      )}
      {showAdd&&(
        <PanelAgregar combinadas={combinadas} onCerrar={()=>setShowAdd(false)} onAgregar={items=>saveEntries([...entries,...items])}/>
      )}
      {entries.length>0&&(
        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:600,color:C.textDim,marginBottom:10}}>{esHoy?"LO QUE COMISTE HOY":`LO QUE COMISTE EL ${formatFecha(currentKey).toUpperCase()}`}</div>
          {entries.map(e=>(
            <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600}}>{e.nombre}</div>
                <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{e.porcion} · {e.kcal} kcal · P {e.proteinas}g · C {e.carbohidratos}g · G {e.grasas}g</div>
              </div>
              <button onClick={()=>saveEntries(entries.filter(x=>x.id!==e.id))} style={{border:"none",background:"transparent",color:C.textMuted,fontSize:20,cursor:"pointer",padding:"4px 8px"}}>×</button>
            </div>
          ))}
        </div>
      )}
      {entries.length===0&&!showAdd&&(
        <div style={{textAlign:"center",color:C.textMuted,padding:"24px 0",fontSize:14}}>{esHoy?"Todavía no registraste nada hoy.":"Sin registros para este día."}</div>
      )}
    </div>
  );
}

function PantallaCombinadas({combinadas,onSave}){
  const[nombre,setNombre]=useState("");
  const[items,setItems]=useState([]);
  const[creando,setCreando]=useState(false);

  const totCombi=items.reduce((a,it)=>({kcal:a.kcal+it.kcal,prot:a.prot+it.proteinas,carbs:a.carbs+it.carbohidratos,fat:a.fat+it.grasas}),{kcal:0,prot:0,carbs:0,fat:0});
  const guardar=()=>{if(!nombre.trim()||items.length===0)return;onSave([...combinadas,{nombre:nombre.trim(),items,id:Date.now()}]);setNombre("");setItems([]);setCreando(false);};
  const eliminar=id=>onSave(combinadas.filter(c=>c.id!==id));

  return(
    <div style={{padding:"16px 16px 0"}}>
      {!creando&&<button style={{...S.btn("primary"),width:"100%",marginBottom:12,fontSize:15,padding:14}} onClick={()=>setCreando(true)}>+ Nueva combi</button>}
      {creando&&(
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700}}>Nueva combi</div>
            <button onClick={()=>{setCreando(false);setNombre("");setItems([]);}} style={{border:"none",background:"transparent",color:C.textMuted,fontSize:20,cursor:"pointer"}}>×</button>
          </div>
          <div style={{marginBottom:10}}>
            <div style={S.label}>Nombre de la combi</div>
            <input style={S.input} type="text" value={nombre} placeholder="ej: Desayuno habitual" onChange={e=>setNombre(e.target.value)}/>
          </div>
          {items.length>0&&(
            <div style={{marginBottom:10}}>
              {items.map((it,i)=>(
                <div key={it.id||i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div><div style={{fontSize:13,fontWeight:600}}>{it.nombre}</div><div style={{fontSize:11,color:C.textDim}}>{it.porcion} · {it.kcal} kcal</div></div>
                  <button onClick={()=>setItems(items.filter((_,j)=>j!==i))} style={{border:"none",background:"transparent",color:C.textMuted,fontSize:18,cursor:"pointer"}}>×</button>
                </div>
              ))}
              <div style={{fontSize:12,color:C.accent,marginTop:8,fontWeight:600}}>Total: {totCombi.kcal} kcal · P {totCombi.prot}g · C {totCombi.carbs}g · G {totCombi.fat}g</div>
            </div>
          )}
          <BuscadorAlimento tituloBoton="+ Sumar ingrediente" onAgregar={item=>setItems([...items,{...item,id:Date.now()}])}/>
          <button style={{...S.btn("primary"),width:"100%",marginTop:8}} onClick={guardar} disabled={!nombre.trim()||items.length===0}>Guardar combi</button>
        </div>
      )}
      {combinadas.length===0&&!creando&&<div style={{textAlign:"center",color:C.textMuted,padding:"24px 0",fontSize:14}}>Todavía no tenés combis guardadas.</div>}
      {combinadas.map(c=>{
        const tot=c.items.reduce((a,it)=>({kcal:a.kcal+it.kcal,prot:a.prot+it.proteinas,carbs:a.carbs+it.carbohidratos,fat:a.fat+it.grasas}),{kcal:0,prot:0,carbs:0,fat:0});
        return(
          <div key={c.id} style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div style={{fontSize:15,fontWeight:700}}>{c.nombre}</div>
              <button onClick={()=>eliminar(c.id)} style={{border:"none",background:"transparent",color:C.danger,fontSize:13,cursor:"pointer",padding:"0 4px"}}>Eliminar</button>
            </div>
            <div style={{fontSize:12,color:C.accent,marginBottom:4,fontWeight:600}}>{tot.kcal} kcal · P {tot.prot}g · C {tot.carbs}g · G {tot.fat}g</div>
            <div style={{fontSize:12,color:C.textDim}}>{c.items.map(it=>`${it.nombre} (${it.porcion})`).join(" · ")}</div>
          </div>
        );
      })}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("hoy");
  const[profile,setProfile]=useState(()=>load("macro_profile",{name:"",weight:"",height:"",age:"",sex:"M",activity:2}));
  const[goal,setGoal]=useState(()=>load("macro_goal","maintain"));
  const[combinadas,setCombinadas]=useState(()=>load("macro_combinadas",[]));
  const saveCombinadas=list=>{setCombinadas(list);save("macro_combinadas",list);};

  const TABS=[{key:"hoy",label:"Hoy",icon:"🍽️"},{key:"combinadas",label:"Combis",icon:"🍱"},{key:"objetivo",label:"Objetivo",icon:"🎯"},{key:"perfil",label:"Perfil",icon:"👤"}];
  const titles={hoy:"Registro diario",combinadas:"Mis combis",objetivo:"Mi objetivo",perfil:"Mi perfil"};

  return(
    <div style={S.app}>
      <div style={S.header}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>💪</span>
          <span style={S.headerTitle}>Mass</span>
          {tab!=="hoy"&&<span style={{...S.headerTitle,color:C.textDim,fontWeight:400,fontSize:14}}>· {titles[tab]}</span>}
        </div>
        {tab==="hoy"&&profile.name&&<span style={{fontSize:12,color:C.textDim}}>Hola, {profile.name}</span>}
      </div>
      {tab==="hoy"&&<PantallaHoy profile={profile} goal={goal} combinadas={combinadas}/>}
      {tab==="combinadas"&&<PantallaCombinadas combinadas={combinadas} onSave={saveCombinadas}/>}
      {tab==="objetivo"&&<PantallaObjetivo profile={profile} goal={goal} onSave={setGoal}/>}
      {tab==="perfil"&&<PantallaPerfil profile={profile} onSave={setProfile}/>}
      <nav style={S.nav}>
        {TABS.map(t=>(
          <button key={t.key} style={S.navBtn(tab===t.key)} onClick={()=>setTab(t.key)}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
